<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C'est en route !</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-wrap"><main class="app-screen"><div class="content" style="padding-bottom:24px;">
  <section class="check-wrap">
    <div class="check-hero"><svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 13 4 4L19 7"/></svg><div class="floating-blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 22 2 9l13 3-10 10Z"/><path d="m9 9 6-6"/><path d="M17 3v4"/><path d="M21 7h-4"/></svg></div></div>
    <h1 class="success-title">C'est en route !</h1>
    <div class="success-sub">Votre M3allem arrive d'ici quelques minutes.</div>
  </section>

  <section class="card summary-card">
    <div class="summary-top">
      <img src="assets/service-thumb.png" class="summary-thumb" alt="Service">
      <div>
        <div class="overline-blue" style="font-size:11px;">SERVICE</div>
        <div style="font-size:23px; font-weight:900; letter-spacing:-.03em;">Plomberie Urgente</div>
        <div class="muted" style="font-size:14px; margin-top:2px;">"Fuite sous l'évier"</div>
      </div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-columns">
      <div>
        <div class="label">Paiement</div>
        <div style="font-size:18px; font-weight:900; margin-top:8px; display:flex; align-items:center; gap:10px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 12h10"/><path d="M16 9c.8 1.2 2 2 3 2-1 .2-2.2 1-3 2"/><path d="M8 9c-.8 1.2-2 2-3 2 1 .2 2.2 1 3 2"/></svg> Sur place</div>
      </div>
      <div style="text-align:right;">
        <div class="label">Montant</div>
        <div class="summary-amount" style="margin-top:8px;">150 MAD</div>
      </div>
    </div>
    <div class="arrival-strip">
      <img src="assets/avatar-karim.png" alt="Karim A.">
      <div>
        <div style="font-size:16px; font-weight:900;">Karim A.</div>
        <div class="muted" style="font-size:13px; text-transform:uppercase; letter-spacing:.04em;">Arrivée estimée : 12 min</div>
      </div>
    </div>
  </section>
</div>
<div class="footer-actions">
  <div class="screen-divider" style="margin:0 -24px 32px;"></div>
  <button class="btn-primary"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18-6 3V6l6-3 6 3 6-3v15l-6 3-6-3Z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg> Suivre la Commande <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
  <button class="btn-ghost mt-20" style="font-size:17px; font-weight:800;">Retour à l’accueil</button>
</div></main></div>

</body>
</html>
